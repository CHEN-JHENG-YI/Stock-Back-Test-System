name: Design discussion (pre-ADR)
description: Open this when you want to discuss a design before opening an ADR PR.
title: "design: <short title>"
labels: ["design", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this only for design questions that don't yet have a clear proposal.
        Once the discussion converges, the outcome should be captured as an ADR PR
        in `Docs/Decisions/` (the canonical location). **Verbal-only decisions don't exist** in this repo.

        For an already-formed proposal, prefer opening an ADR PR directly — the
        discussion happens on the PR.

  - type: textarea
    id: question
    attributes:
      label: The design question
      placeholder: "Should the engine support multi-symbol baskets in v0.4 or wait until v1.0?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this coming up now? What constraints matter?
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options on the table
      description: Two or more concrete options. If you only have one, you don't need a discussion — open an ADR PR.

  - type: input
    id: decider
    attributes:
      label: Who decides?
      description: Name a single CODEOWNER (or "team consensus, deadline X") so this doesn't drift.
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: ISO date or "next sync". Discussions without a deadline rot.
      placeholder: 2026-05-13
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Sanity checks
      options:
        - label: I read the relevant `Docs/Specs/` and `Docs/Decisions/` first; this isn't already settled.
          required: true
        - label: I will write up the conclusion as an ADR within 1 day of the deadline.
          required: true
